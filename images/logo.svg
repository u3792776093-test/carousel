<svg width="460" height="280" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="transparent"/>

  <!-- Main Brand (bigger) -->
  <text x="220" y="125" 
        font-family="Kunstler Script, Brush Script MT, cursive" 
        font-size="72" 
        text-anchor="middle" 
        fill="#5FA8D3"
        stroke="#1F3A5F" 
        stroke-width="0.7">
    Patmos Inn
  </text>

  <!-- Bigger sun (slightly right) -->
  <circle cx="360" cy="100" r="10" fill="#F6C453"/>

  <!-- Horizon line 1 -->
  <line x1="120" y1="150" x2="340" y2="150" 
        stroke="#5FA8D3" stroke-width="2.5"/>

  <!-- Horizon line 2 -->
  <line x1="140" y1="158" x2="320" y2="158" 
        stroke="#5FA8D3" stroke-width="2" opacity="0.6"/>

  <!-- Tagline -->
  <text x="220" y="195" 
        font-family="Arial, sans-serif" 
        font-size="12" 
        letter-spacing="3"
        text-anchor="middle" 
        fill="#1F3A5F">
    SEAFRONT RESIDENCE
  </text>

  <!-- Location -->
  <text x="220" y="218" 
        font-family="Arial, sans-serif" 
        font-size="10" 
        letter-spacing="2"
        text-anchor="middle" 
        fill="#7A8FA3">
    SKALA PATMOS
  </text>
</svg>