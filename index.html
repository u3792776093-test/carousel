<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patmos Inn - Seafront Residence</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            overflow-x: hidden;
        }

        .hero {
            position: relative;
            width: 100%;
            height: 100vh;
            background-image: url('images/hero.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Dark overlay for better logo visibility */
        .hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.3);
            z-index: 1;
        }

        .logo-container {
            position: relative;
            z-index: 2;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 500px;
            padding: 20px;
        }

        .logo-container svg {
            width: 100%;
            height: auto;
            max-width: 500px;
            filter: drop-shadow(2px 2px 8px rgba(0, 0, 0, 0.5));
        }

        /* Responsive adjustments for tablets */
        @media (max-width: 768px) {
            .logo-container {
                max-width: 400px;
            }
        }

        /* Responsive adjustments for mobile phones */
        @media (max-width: 480px) {
            .hero {
                height: 100vh;
            }

            .logo-container {
                max-width: 300px;
                padding: 15px;
            }
        }

        /* Extra small screens */
        @media (max-width: 360px) {
            .logo-container {
                max-width: 250px;
            }
        }
    </style>
</head>
<body>
    <section class="hero">
        <div class="logo-container">
            <svg width="460" height="280" xmlns="http://www.w3.org/2000/svg">
                <rect width="100%" height="100%" fill="#ffffff"/>

                <!-- Main Brand (bigger) -->
                <text x="220" y="125" 
                      font-family="Kunstler Script, Brush Script MT, cursive" 
                      font-size="72" 
                      text-anchor="middle" 
                      fill="#5FA8D3"
                      stroke="#1F3A5F" 
                      stroke-width="0.7">
                    Patmos Inn
                </text>

                <!-- Bigger sun (slightly right) -->
                <circle cx="360" cy="100" r="10" fill="#F6C453"/>

                <!-- Horizon line 1 -->
                <line x1="120" y1="150" x2="340" y2="150" 
                      stroke="#5FA8D3" stroke-width="2.5"/>

                <!-- Horizon line 2 -->
                <line x1="140" y1="158" x2="320" y2="158" 
                      stroke="#5FA8D3" stroke-width="2" opacity="0.6"/>

                <!-- Tagline -->
                <text x="220" y="195" 
                      font-family="Arial, sans-serif" 
                      font-size="12" 
                      letter-spacing="3"
                      text-anchor="middle" 
                      fill="#1F3A5F">
                    SEAFRONT RESIDENCE
                </text>

                <!-- Location -->
                <text x="220" y="218" 
                      font-family="Arial, sans-serif" 
                      font-size="10" 
                      letter-spacing="2"
                      text-anchor="middle" 
                      fill="#7A8FA3">
                    SKALA PATMOS
                </text>
            </svg>
        </div>
    </section>
</body>
</html>
