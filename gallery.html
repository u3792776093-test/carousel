<style>

/* ================= CAROUSEL ================= */
.wrapper {
    margin-top: 90px;
}

.carousel {
    max-width: 1200px;
    margin: auto;
    position: relative;
    overflow: hidden;
    border-radius: 14px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.25);
}

/* slides */
.slide {
    display: none;
    width: 100%;
    height: 600px;
    object-fit: cover;
}

.slide.active {
    display: block;
}

/* buttons */
.prev, .next {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    width: 50px;
    height: 50px;
    border-radius: 50%;
    background: rgba(31,58,95,0.8);
    color: #F6C453;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 26px;
    cursor: pointer;
}

.prev:hover, .next:hover {
    background: #F6C453;
    color: #1F3A5F;
}

.prev { left: 15px; }
.next { right: 15px; }

/* ================= THUMBS ================= */
.thumbs {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin: 15px auto 40px;
    max-width: 1200px;
    overflow-x: auto;
    padding: 10px;
}

.thumbs img {
    width: 100px;
    height: 65px;
    object-fit: cover;
    border-radius: 8px;
    opacity: 0.6;
    cursor: pointer;
}

.thumbs img.active {
    opacity: 1;
    border: 2px solid #F6C453;
}


</style>
</head>

<script>

/* ================= HAMBURGER ================= */


/* ================= CAROUSEL ================= */
let i = 0;
const slides = document.querySelectorAll(".slide");
const thumbs = document.querySelectorAll(".thumbs img");

function show(n) {
    slides.forEach(s => s.classList.remove("active"));
    thumbs.forEach(t => t.classList.remove("active"));

    slides[n].classList.add("active");
    thumbs[n].classList.add("active");

    i = n;
}

function move(step) {
    i += step;
    if (i >= slides.length) i = 0;
    if (i < 0) i = slides.length - 1;
    show(i);
}

function go(n) {
    show(n);
}

/* ================= AUTOPLAY ================= */
setInterval(() => {
    move(1);
}, 4000);

</script>
